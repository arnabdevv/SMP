services:
  - type: web
    name: smp-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: JWT_KEY
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: ORIGIN
        sync: false   # Set to your Vercel frontend URL, e.g. https://smp.vercel.app
